<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="숙소 설명">
    <meta name="keywords" content="SEO 키워드">
    <title>오시는길 - 숙소명</title>

    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/directions.css">
    <link rel="stylesheet" href="styles/theme.css">

  <!-- Open Graph Meta Tags for Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="무의도 해둥실펜션 - 오시는길" />
  
  <meta property="og:image" content="https://jlnjajtcnyqupfaqjerz.supabase.co/storage/v1/object/public/app-images/property/62f170ca-cf16-4dd4-8a0d-1f539ce41302/thumbnail/1774229726186-8qak5qyq4nc.jpg" />
  <meta property="og:url" content="https://sundungsil.kr" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="무의도 해둥실펜션 - 오시는길" />
  
  <meta name="twitter:image" content="https://jlnjajtcnyqupfaqjerz.supabase.co/storage/v1/object/public/app-images/property/62f170ca-cf16-4dd4-8a0d-1f539ce41302/thumbnail/1774229726186-8qak5qyq4nc.jpg" />
</head>
<body>
    <!-- Include Header -->
    <div id="header-placeholder"></div>

    <!-- Mobile Floating YBS Button -->
    <button class="mobile-floating-ybs-btn" aria-label="YBS" data-ybs-button>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M3 9H21" stroke="currentColor" stroke-width="2"/>
            <path d="M8 2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M16 2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
    </button>

    <!-- Mobile Floating Book Now Button -->
    <button class="mobile-floating-book-btn" aria-label="Book Now" data-booking-engine>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M3 9H21" stroke="currentColor" stroke-width="2"/>
            <path d="M8 2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M16 2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
    </button>

    <!-- 오시는길 섹션 히어로 -->
    <section class="hero-section">
        <!-- Background Images Slider with Fade Animation -->
        <div class="hero-background">
            <div class="hero-slider" id="hero-slider">
                <!-- Hero slides will be dynamically generated here -->
            </div>
            <div class="hero-image-overlay"></div>
        </div>
        <!-- Hero Content -->
        <div class="hero-content" id="hero-content">
            <div class="hero-text">
                <div class="brand-name" id="brand-name">
                    <h4 class="brand-title" data-property-name-en></h4>
                    <div class="brand-divider"></div>
                    <p class="brand-subtitle">LOCATION</p>
                </div>
            </div>
        </div>
        <div class="hero-slider-progress">
            <div class="hero-slider-nav">
                <button class="hero-slider-arrow prev" id="hero-prev"></button>
                <span class="hero-slider-current">01</span>
                <div class="hero-slider-line">
                    <div class="hero-slider-line-fill"></div>
                </div>
                <span class="hero-slider-total">03</span>
                <button class="hero-slider-arrow next" id="hero-next"></button>
            </div>
        </div>
    </section>

    <!-- Location Info Section -->
    <section class="location-info-section">
        <div class="directions-content-container">
        <!-- Facility Introduction Section -->
        <div class="facility-intro-section">
            <div class="facility-intro-content">
                <div class="facility-label">
                    <span class="facility-number" data-directions-title>LOCATION</span>
                </div>
                <p class="facility-description" data-directions-description>
                    오시는 길 안내입니다.
                </p>
            </div>
        </div>

        <!-- 지도 섹션 -->
        <section class="map-section main-content-fade-in">
            <div class="container">
                <div class="address-section">
                    <!-- 안내사항 (주소 포함)  -->
                     <div class="notice-wrap">
                        <!-- 위치 안내 원형 이미지 -->
                        <div class="location-image-circle">
                            <img src="" alt="위치 안내 이미지" class="location-circle-image" data-directions-location-image loading="lazy">
                        </div>

                        <p>
                            <svg class="location-icon" viewBox="0 0 24 24">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                <circle cx="12" cy="10" r="3"></circle>
                            </svg>
                            <span data-directions-address></span>
                        </p>
                        <div class="notice-customfield">
                            <h4 data-customfield-directions-notice-title>안내사항</h4>
                            <p data-customfield-directions-notice-description>안내사항 1</p>
                        </div>
                     </div>
                </div>
            </div>
                <div class="map-container">
                    <div id="kakao-map"></div>
                </div>
        </section>
        </div> <!-- directions-content-container -->

    <!-- Kakao Map SDK -->
    <script type="text/javascript" src="js/kakao-maps-sdk.js"></script>

  <!-- 마무리 섹션 -->
  <section class="index-closing">
    <!-- Background Images with Parallax -->
    <div class="closing-bg-parallax">
      <img data-closing-image src="" alt="마무리 섹션 이미지" loading="lazy">
    </div>

    <!-- 배경색 컨테이너 -->
    <div class="closing-color-container">
      <!-- 우측 원형 구멍 영역 -->
      <div class="closing-circle-reveal">
        <!-- 모바일용 이미지 -->
        <img class="closing-circle-image" data-closing-image src="" alt="마무리 섹션 이미지" loading="lazy">
      </div>

      <!-- 텍스트 컨텐츠 -->
      <div class="index-closing-text">
        <h2 class="closing-property-name-en" data-property-name-en></h2>
        <div class="closing-divider"></div>
      </div>
    </div>
  </section>

    <!-- Include ImageWithFallback script -->
    <script src="js/image-with-fallback.js"></script>

    <!-- Common JavaScript -->
    <script src="js/common.js"></script>

    <!-- Image Helpers -->
    <script src="js/image-helpers.js"></script>

    <!-- Base Data Mapper -->
    <script src="js/data-mapper/core/base-mapper.js"></script>

    <!-- Directions Page Mapper -->
    <script src="js/data-mapper/pages/directions-mapper.js"></script>

    <!-- Preview Handler for Admin Integration -->
    <script src="js/preview-handler.js"></script>

    <!-- Header Footer Mapper -->
    <script src="js/data-mapper/pages/header-footer-mapper.js"></script>

    <!-- Header and Footer Loader -->
    <script src="js/header-footer-loader.js"></script>

    <!-- Page-specific script -->
    <script src="js/pages/directions.js"></script>

</body>
</html>
