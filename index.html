<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="숙소 설명">
    <meta name="keywords" content="SEO 키워드">
    <title>숙소명 - 템플릿</title>

    <!-- Preload critical resources -->
    <link rel="preload" href="styles/common.css" as="style">
    <link rel="preload" href="styles/index.css" as="style">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/index.css">
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/popup.css">

  <!-- Open Graph Meta Tags for Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="무의도 해둥실펜션 - 홈" />
  
  
  <meta property="og:url" content="https://sundungsil.kr" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="무의도 해둥실펜션 - 홈" />
  
  
</head>
<body>
    <!-- Include Header -->
    <div id="header-placeholder"></div>

    <!-- Mobile Floating YBS Button -->
    <button class="mobile-floating-ybs-btn" aria-label="YBS" data-ybs-button>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M3 9H21" stroke="currentColor" stroke-width="2"/>
            <path d="M8 2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M16 2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
    </button>

    <!-- Mobile Floating Book Now Button -->
    <button class="mobile-floating-book-btn" aria-label="Book Now" data-booking-engine>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M3 9H21" stroke="currentColor" stroke-width="2"/>
            <path d="M8 2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M16 2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
    </button>

    <!-- 메인 소개 섹션 custom-field -->
    <section class="hero-section">
        <!-- Background Images Slider with Fade Animation -->
        <div class="hero-background">
            <div class="hero-slider" id="hero-slider">
                <!-- Hero slides will be dynamically generated here -->
            </div>
            <div class="hero-image-overlay"></div>
        </div>
        <!-- Hero Content -->
        <div class="hero-content" id="hero-content">
            <div class="hero-text">
                <div class="brand-name" id="brand-name">
                    <h4 class="brand-title" data-property-name-en></h4>
                    <div class="brand-divider"></div>
                    <p class="brand-subtitle" data-property-name></p>
                </div>
            </div>
        </div>
        <div class="hero-slider-progress">
            <div class="hero-slider-nav">
                <button class="hero-slider-arrow prev" id="hero-prev"></button>
                <span class="hero-slider-current">01</span>
                <div class="hero-slider-line">
                    <div class="hero-slider-line-fill"></div>
                </div>
                <span class="hero-slider-total">03</span>
                <button class="hero-slider-arrow next" id="hero-next"></button>
            </div>
        </div>
    </section>

    <!-- 핵심 메세지 섹션 custom-field -->
    <section class="essence-section main-content-fade-in">
        <div class="essence-wrapper">
            <!-- Title -->
            <h2 class="essence-title" data-essence-title></h2>

            <!-- Left Large Image -->
            <div class="essence-left-image" data-essence-image-0>
                <img src="" alt="숙소 외관" loading="lazy">
            </div>

            <!-- Center Text Content -->
            <div class="essence-center-content">
                <p class="essence-description" data-essence-description></p>
            </div>

            <!-- Right Top Small Image -->
            <div class="essence-right-image" data-essence-image-1>
                <img src="" alt="숙소 내부" loading="lazy">
            </div>
        </div>

        <!-- Essence Footer -->
        <div class="essence-footer">
            <h3 data-property-name-en></h3>
        </div>
    </section>

    <!-- 객실 프리뷰 섹션 -->
    <section class="room-preview-section main-content-fade-in">
        <div class="rooms-wrap">
            <div class="rooms-list">
                <ul class="room-name" data-room-tabs>
                    <!-- Room tabs will be dynamically generated here -->
                </ul>
                <div class="room-info" data-room-descriptions>
                    <!-- Room descriptions will be dynamically generated here -->
                </div>
            </div>
            <div class="rooms-right">
                <div class="room-preview-header">
                    <p class="room-preview-title">Room's Preview</p>
                </div>
                <div class="rooms-thumb" data-room-images>
                    <!-- Room images will be dynamically generated here -->
                </div>
            </div>
        </div>
    </section>

    <!-- 갤러리 섹션 custom-field -->
    <section class="experience-gallery-section main-content-fade-in">
        <!-- Title Area -->
        <div class="experience-container">
            <div class="experience-header">
                <h2 class="experience-title" data-gallery-title>Special Offers</h2>
            </div>
        </div>

        <!-- Gallery Slider (100% width) -->
        <div class="gallery-slider-wrapper">
            <div class="gallery-slider-track" data-gallery-images>
                <!-- Gallery slides will be dynamically generated here -->
            </div>
        </div>
    </section>



    <!-- 마무리 섹션 custom-field -->
    <section class="index-closing">
        <!-- 배경 이미지 (parallax) -->
        <div class="closing-bg-parallax">
            <img data-closing-image src="" alt="마무리 섹션 이미지" loading="lazy">
        </div>

        <!-- 배경색 컨테이너 -->
        <div class="closing-color-container">
            <!-- 우측 원형 구멍 영역 -->
            <div class="closing-circle-reveal">
                <!-- 모바일용 이미지 -->
                <img class="closing-circle-image" data-closing-image-mobile src="" alt="마무리 섹션 이미지" loading="lazy">
            </div>

            <!-- 텍스트 컨텐츠 -->
            <div class="index-closing-text">
                <h2 class="closing-property-name-en" data-property-name-en></h2>
                <div class="closing-divider"></div>
                <p class="closing-subtitle" data-closing-subtitle></p>
            </div>
        </div>
    </section>

    <!-- Popup System -->
    <div id="popup-container"></div>

    <!-- Include ImageWithFallback script -->
    <script src="js/image-with-fallback.js"></script>

    <!-- Preview Handler for Admin Integration -->
    <script src="js/preview-handler.js"></script>

    <!-- Image Helpers -->
    <script src="js/image-helpers.js"></script>

    <!-- Base Data Mapper -->
    <script src="js/data-mapper/core/base-mapper.js"></script>

    <!-- Index Page Mapper -->
    <script src="js/data-mapper/pages/index-mapper.js"></script>

    <!-- Header Footer Mapper -->
    <script src="js/data-mapper/pages/header-footer-mapper.js"></script>

    <!-- Header and Footer Loader -->
    <script src="js/header-footer-loader.js"></script>

    <!-- Page-specific script -->
    <script src="js/pages/index.js"></script>
    <script src="js/popup.js"></script>

</body>
</html>
