<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="숙소 설명">
    <meta name="keywords" content="SEO 키워드">
    <title id="page-title">객실 안내 - 숙소명</title>

    <!-- Preload critical resources -->
    <link rel="preload" href="styles/common.css" as="style">
    <link rel="preload" href="styles/room.css" as="style">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/room.css">
    <link rel="stylesheet" href="styles/theme.css">

  <!-- Open Graph Meta Tags for Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="무의도 해둥실펜션 - 객실안내" />
  
  <meta property="og:image" content="https://jlnjajtcnyqupfaqjerz.supabase.co/storage/v1/object/public/app-images/property/62f170ca-cf16-4dd4-8a0d-1f539ce41302/thumbnail/1774229726186-8qak5qyq4nc.jpg" />
  <meta property="og:url" content="https://sundungsil.kr" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="무의도 해둥실펜션 - 객실안내" />
  
  <meta name="twitter:image" content="https://jlnjajtcnyqupfaqjerz.supabase.co/storage/v1/object/public/app-images/property/62f170ca-cf16-4dd4-8a0d-1f539ce41302/thumbnail/1774229726186-8qak5qyq4nc.jpg" />
</head>
<body>
    <!-- Include Header -->
    <div id="header-placeholder"></div>

    <!-- Mobile Floating YBS Button -->
    <button class="mobile-floating-ybs-btn" aria-label="YBS" data-ybs-button>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M3 9H21" stroke="currentColor" stroke-width="2"/>
            <path d="M8 2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M16 2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
    </button>

    <!-- Mobile Floating Book Now Button -->
    <button class="mobile-floating-book-btn" aria-label="Book Now" data-booking-engine>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M3 9H21" stroke="currentColor" stroke-width="2"/>
            <path d="M8 2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M16 2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
    </button>

    <!-- 객실 소개 섹션 히어로 -->
    <section class="hero-section">
        <!-- Background Images Slider with Fade Animation -->
        <div class="hero-background">
            <div class="hero-slider" id="hero-slider" data-room-hero-slides-container>
                <!-- Hero slides will be dynamically generated here -->
            </div>
            <div class="hero-image-overlay"></div>
        </div>
        <!-- Hero Content -->
        <div class="hero-content" id="hero-content">
            <div class="hero-text">
                <div class="brand-name" id="brand-name">
                    <h4 class="brand-title" data-property-name-en></h4>
                    <div class="brand-divider"></div>
                    <p class="brand-subtitle" data-room-hero-name></p>
                </div>
            </div>
        </div>
        <div class="hero-slider-progress">
            <div class="hero-slider-nav">
                <button class="hero-slider-arrow prev" id="hero-prev"></button>
                <span class="hero-slider-current">01</span>
                <div class="hero-slider-line">
                    <div class="hero-slider-line-fill" id="hero-progress-fill"></div>
                </div>
                <span class="hero-slider-total">03</span>
                <button class="hero-slider-arrow next" id="hero-next"></button>
            </div>
        </div>
    </section>

    <!-- Main Content Section -->
    <section class="main-content-section main-content-fade-in">
        <div class="room-content-container">
        <!-- Room Header Info -->
        <div class="room-header-info">
            <h2 id="room-name-display" class="room-name-display" data-room-info-name></h2>
            <p id="room-description-display" class="room-description-display" data-room-info-description></p>
        </div>

        <!-- Main Content Wrapper (Images + Details) -->
        <div class="room-main-wrapper">
            <!-- Room Images Section -->
            <div class="room-images-section">
                <div class="room-image-horizontal">
                    <img src="" alt="Room Horizontal View" class="room-img-horizontal" data-room-interior-image-0>
                </div>
                <!-- BOOK NOW Button -->
                <button class="room-view-btn" data-booking-engine>
                    <span class="btn-text">BOOK NOW</span>
                    <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <line x1="7" y1="17" x2="17" y2="7"></line>
                        <polyline points="7,7 17,7 17,17"></polyline>
                    </svg>
                </button>
            </div>

            <!-- Room Details Tabs Section -->
            <div class="room-details-section">
                <!-- Tab Navigation -->
                <div class="room-tabs-nav">
                    <button class="room-tab-button active" data-tab="roominfo-tab">Room Info</button>
                    <button class="room-tab-button" data-tab="amenities-tab">Amenities</button>
                </div>

                <!-- Tab Content -->
                <div class="room-tabs-content">
                    <!-- Room Info Tab -->
                    <div class="room-tab-content active" id="roominfo-tab">
                        <div id="room-info-display" class="tab-info-list" data-room-info></div>
                    </div>

                    <!-- Amenities Tab -->
                    <div class="room-tab-content" id="amenities-tab">
                        <div id="amenities-display" class="tab-info-list" data-room-amenities></div>
                    </div>
                </div>
            </div>
        </div>
        <!-- End of room-main-wrapper -->

        <!-- Gallery Description and Property Name -->
        <div class="gallery-property-english-name" data-property-nameEn></div>

        <!-- Room Gallery Section -->
        <section class="room-gallery-section-wrap">
            <div class="room-gallery-container" data-room-gallery-grid>
                <!-- Gallery Thumbnails - Left Side -->
                <div class="gallery-images-area">
                    <!-- Thumbnail Images Grid -->
                    <div class="gallery-thumbnails">
                        <div class="gallery-thumb">
                            <img src="" alt="Room View 1" data-customfield-room-gallery-thumb-1>
                        </div>
                        <div class="gallery-thumb">
                            <img src="" alt="Room View 2" data-customfield-room-gallery-thumb-2>
                        </div>
                        <div class="gallery-thumb">
                            <img src="" alt="Room View 3" data-customfield-room-gallery-thumb-3>
                        </div>
                    </div>
                </div>

                <!-- Gallery Main Image - Right Side -->
                <div class="gallery-content-area">
                    <div class="gallery-main-image">
                        <img src="" alt="Room Main View" data-customfield-room-gallery-main-image>
                    </div>
                </div>
            </div>
        </section>
        </div> <!-- room-content-container -->
    </section>

    <!-- 마무리 섹션 -->
    <section class="index-closing">
        <!-- Background Images with Parallax -->
        <div class="closing-bg-parallax">
            <img data-closing-image src="" alt="마무리 섹션 이미지" loading="lazy">
        </div>

        <!-- 배경색 컨테이너 -->
        <div class="closing-color-container">
            <!-- 우측 원형 구멍 영역 -->
            <div class="closing-circle-reveal">
                <!-- 모바일용 이미지 -->
                <img class="closing-circle-image" data-closing-image-mobile src="" alt="마무리 섹션 이미지" loading="lazy">
            </div>

            <!-- 텍스트 컨텐츠 -->
            <div class="index-closing-text">
                <h2 class="closing-property-name-en" data-property-name-en></h2>
                <div class="closing-divider"></div>
            </div>
        </div>
    </section>

    <!-- Include ImageWithFallback script -->
    <script src="js/image-with-fallback.js"></script>

    <!-- Common JavaScript -->
    <script src="js/common.js"></script>

    <!-- Image Helpers -->
    <script src="js/image-helpers.js"></script>

    <!-- Base Data Mapper -->
    <script src="js/data-mapper/core/base-mapper.js"></script>

    <!-- Room Page Mapper -->
    <script src="js/data-mapper/pages/room-mapper.js"></script>

    <!-- Preview Handler for Admin Integration -->
    <script src="js/preview-handler.js"></script>

    <!-- Header Footer Mapper -->
    <script src="js/data-mapper/pages/header-footer-mapper.js"></script>

    <!-- Header and Footer Loader -->
    <script src="js/header-footer-loader.js"></script>

    <!-- Page-specific script -->
    <script src="js/pages/room.js"></script>

</body>
</html>
