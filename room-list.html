<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="숙소 설명">
    <meta name="keywords" content="SEO 키워드">
    <title>객실 목록 - 숙소명</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/room-list.css">
    <link rel="stylesheet" href="styles/theme.css">

  <!-- Open Graph Meta Tags for Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="무의도 해둥실펜션" />
  
  
  <meta property="og:url" content="https://sundungsil.kr" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="무의도 해둥실펜션" />
  
  
</head>
<body>

    <!-- Include Header -->
    <div id="header-placeholder"></div>

    <!-- Mobile Floating YBS Button -->
    <button class="mobile-floating-ybs-btn" aria-label="YBS" data-ybs-button>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M3 9H21" stroke="currentColor" stroke-width="2"/>
            <path d="M8 2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M16 2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
    </button>

    <!-- Mobile Floating Book Now Button -->
    <button class="mobile-floating-book-btn" aria-label="Book Now" data-booking-engine>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M3 9H21" stroke="currentColor" stroke-width="2"/>
            <path d="M8 2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M16 2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
    </button>

    <!-- 객실 소개 섹션 히어로 -->
    <section class="hero-section">
        <!-- Background Images Slider with Fade Animation -->
        <div class="hero-background">
            <div class="hero-slider" id="hero-slider">
                <!-- Hero slides will be dynamically generated here -->
            </div>
            <div class="hero-image-overlay"></div>
        </div>
        <!-- Hero Content -->
        <div class="hero-content" id="hero-content">
            <div class="hero-text">
                <div class="brand-name" id="brand-name">
                    <h4 class="brand-title" data-property-name-en></h4>
                    <div class="brand-divider"></div>
                    <p class="brand-subtitle"><span data-customfield-room-list-main-title></span> ROOMS</p>
                </div>
            </div>
        </div>
        <div class="hero-slider-progress">
            <div class="hero-slider-nav">
                <button class="hero-slider-arrow prev" id="hero-prev"></button>
                <span class="hero-slider-current">01</span>
                <div class="hero-slider-line">
                    <div class="hero-slider-line-fill"></div>
                </div>
                <span class="hero-slider-total">03</span>
                <button class="hero-slider-arrow next" id="hero-next"></button>
            </div>
        </div>
    </section>

    <!-- Room List Section -->
    <section class="room-list-section main-content-fade-in">
            <!-- Room Grid -->
            <div class="room-grid" id="room-grid">
                <!-- Room cards will be dynamically generated here -->
            </div>

    </section>

  <!-- 마무리 섹션 -->
  <section class="index-closing">
    <!-- Background Images with Parallax -->
    <div class="closing-bg-parallax">
      <img data-closing-image src="" alt="마무리 섹션 이미지" loading="lazy">
    </div>

    <!-- 배경색 컨테이너 -->
    <div class="closing-color-container">
      <!-- 우측 원형 구멍 영역 -->
      <div class="closing-circle-reveal">
        <!-- 모바일용 이미지 -->
        <img class="closing-circle-image" data-closing-image-mobile src="" alt="마무리 섹션 이미지" loading="lazy">
      </div>

      <!-- 텍스트 컨텐츠 -->
      <div class="index-closing-text">
        <h2 class="closing-property-name-en" data-property-name-en></h2>
        <div class="closing-divider"></div>
      </div>
    </div>
  </section>

    <!-- Include ImageWithFallback script -->
    <script src="js/image-with-fallback.js"></script>

    <!-- Common JavaScript -->
    <script src="js/common.js"></script>

    <!-- Image Helpers -->
    <script src="js/image-helpers.js"></script>

    <!-- Base Data Mapper -->
    <script src="js/data-mapper/core/base-mapper.js"></script>

    <!-- Room List Mapper -->
    <script src="js/data-mapper/pages/room-list-mapper.js"></script>

    <!-- Preview Handler for Admin Integration -->
    <script src="js/preview-handler.js"></script>

    <!-- Header Footer Mapper -->
    <script src="js/data-mapper/pages/header-footer-mapper.js"></script>

    <!-- Header and Footer Loader -->
    <script src="js/header-footer-loader.js"></script>

    <!-- Page-specific script -->
    <script src="js/pages/room-list.js"></script>

</body>
</html>
